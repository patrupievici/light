<body class="bg-background text-on-background min-h-screen font-body selection:bg-primary selection:text-on-primary">
<!-- Grain Overlay for texture -->
<div class="fixed inset-0 grain-overlay z-[60]"></div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#121316]/80 backdrop-blur-lg border-b border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.1)]">
<button class="flex items-center justify-center p-2 active:scale-95 transition-transform text-[#00D7B0]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="text-2xl font-[800] tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-[#4A8DFF] to-[#00D7B0]">ZVELT</div>
<button class="flex items-center justify-center p-2 active:scale-95 transition-transform text-[#00D7B0]">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-xl mx-auto flex flex-col min-h-screen">
<!-- Hero Section -->
<section class="mb-12">
<h1 class="text-4xl md:text-5xl font-headline font-extrabold text-on-background mb-4 tracking-tight leading-tight">
                Your body stats
            </h1>
<p class="font-mono text-primary text-sm tracking-tighter">
                // All data stays private
            </p>
</section>
<!-- Sex Toggle Selection -->
<section class="mb-10">
<div class="flex p-1 bg-surface-container-low rounded-full w-full gap-1">
<button class="flex-1 py-3 px-4 rounded-full font-headline font-bold text-sm transition-all bg-primary-container text-on-primary-container shadow-lg shadow-primary/20">
                    Male
                </button>
<button class="flex-1 py-3 px-4 rounded-full font-headline font-bold text-sm transition-all text-on-surface-variant hover:text-on-surface">
                    Female
                </button>
<button class="flex-1 py-3 px-4 rounded-full font-headline font-bold text-sm transition-all text-on-surface-variant hover:text-on-surface">
                    Other
                </button>
</div>
</section>
<!-- Stats Grid (Bento Style Asymmetry) -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
<!-- Height Card -->
<div class="glass-card p-8 rounded-xl flex flex-col justify-between min-h-[160px] relative overflow-hidden md:col-span-2 group hover:bg-white/[0.06] transition-colors">
<div class="flex justify-between items-start">
<span class="font-mono text-xs uppercase tracking-widest text-on-surface-variant">Height</span>
<span class="material-symbols-outlined text-outline text-xl">straighten</span>
</div>
<div class="flex items-baseline gap-2 mt-4">
<span class="text-6xl font-headline font-extrabold text-primary">184</span>
<span class="font-mono text-xl text-primary/60">cm</span>
</div>
<!-- Subtle decorative element -->
<div class="absolute -right-4 -bottom-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-[120px]" style="font-variation-settings: 'FILL' 1;">height</span>
</div>
</div>
<!-- Weight Card -->
<div class="glass-card p-8 rounded-xl flex flex-col justify-between min-h-[160px] relative overflow-hidden group hover:bg-white/[0.06] transition-colors">
<div class="flex justify-between items-start">
<span class="font-mono text-xs uppercase tracking-widest text-on-surface-variant">Weight</span>
<span class="material-symbols-outlined text-outline text-xl">fitness_center</span>
</div>
<div class="flex items-baseline gap-2 mt-4">
<span class="text-5xl font-headline font-extrabold text-primary">82.5</span>
<span class="font-mono text-lg text-primary/60">kg</span>
</div>
</div>
<!-- Age Card -->
<div class="glass-card p-8 rounded-xl flex flex-col justify-between min-h-[160px] relative overflow-hidden group hover:bg-white/[0.06] transition-colors">
<div class="flex justify-between items-start">
<span class="font-mono text-xs uppercase tracking-widest text-on-surface-variant">Age</span>
<span class="material-symbols-outlined text-outline text-xl">calendar_today</span>
</div>
<div class="flex items-baseline gap-2 mt-4">
<span class="text-5xl font-headline font-extrabold text-primary">28</span>
<span class="font-mono text-lg text-primary/60">yrs</span>
</div>
</div>
</section>

                </p>
</div>
</section>

<span class="material-symbols-outlined">person</span>
