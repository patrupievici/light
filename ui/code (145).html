<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PULSE - Sprint Note Composer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#006b57",
                    "surface-container-high": "#292a2d",
                    "outline-variant": "#3b4a44",
                    "secondary": "#adc6ff",
                    "on-primary": "#00382c",
                    "tertiary": "#8ee7ff",
                    "error": "#ffb4ab",
                    "surface-container-low": "#1b1b1f",
                    "surface-bright": "#38393c",
                    "primary-fixed-dim": "#21dfb8",
                    "surface": "#121316",
                    "on-primary-container": "#005847",
                    "tertiary-fixed-dim": "#42d7f8",
                    "primary-fixed": "#52fcd3",
                    "inverse-surface": "#e3e2e6",
                    "surface-container-highest": "#343538",
                    "on-primary-fixed": "#002019",
                    "surface-dim": "#121316",
                    "on-error": "#690005",
                    "on-tertiary-fixed-variant": "#004e5c",
                    "surface-container-lowest": "#0d0e11",
                    "on-surface-variant": "#bacac3",
                    "on-secondary-fixed-variant": "#004494",
                    "inverse-on-surface": "#2f3034",
                    "tertiary-container": "#35cfef",
                    "on-tertiary-fixed": "#001f26",
                    "surface-variant": "#343538",
                    "on-surface": "#e3e2e6",
                    "secondary-fixed": "#d8e2ff",
                    "on-tertiary-container": "#005564",
                    "on-error-container": "#ffdad6",
                    "surface-tint": "#21dfb8",
                    "outline": "#84948e",
                    "on-secondary-container": "#e0e8ff",
                    "on-primary-fixed-variant": "#005141",
                    "on-secondary": "#002e69",
                    "on-background": "#e3e2e6",
                    "error-container": "#93000a",
                    "background": "#121316",
                    "primary": "#46f4cb",
                    "surface-container": "#1f1f23",
                    "secondary-fixed-dim": "#adc6ff",
                    "secondary-container": "#0264d4",
                    "primary-container": "#00d7b0",
                    "on-tertiary": "#003640",
                    "tertiary-fixed": "#acedff",
                    "on-secondary-fixed": "#001a41"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #121316;
            color: #e3e2e6;
            font-family: 'Inter', sans-serif;
        }
        .liquid-metal {
            background: linear-gradient(135deg, #46f4cb 0%, #00d7b0 100%);
        }
        .glass-panel {
            background: rgba(52, 53, 56, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Top Navigation Anchor (Manual suppression of search/settings for composer focus) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-slate-950/60 backdrop-blur-xl">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-slate-400 hover:text-[#46f4cb] transition-colors cursor-pointer" data-icon="close">close</span>
</div>
<h1 class="font-['Manrope'] font-black tracking-[0.2em] text-[#F5F7FA]">PULSE</h1>
<div class="flex items-center gap-2">
<span class="font-['Inter'] text-[10px] font-medium tracking-wider uppercase text-[#00D7B0]">Draft</span>
</div>
</header>
<main class="h-screen w-full flex flex-col pt-16 pb-20">
<!-- Main Composer Canvas -->
<section class="flex-1 flex flex-col px-8 py-10 max-w-3xl mx-auto w-full">
<!-- User Context Header -->
<div class="flex items-center gap-4 mb-12">
<div class="w-12 h-12 rounded-full overflow-hidden bg-surface-container border border-outline-variant/10">
<img class="w-full h-full object-cover" data-alt="Portrait of a focused female athlete with subtle cinematic lighting and dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAyAoRvNei8J55AU1llsV1d7SM23ghTFoRHPsdJISSMajJucV6lI8prSF5vHGF9Y28iStD9DTaeH9y1ibAkKAneEK7_lbMjamgDoXwr6TrDjlpTPJEh7PIzL9OXkv22i-CjL1vrRp56qm7ZmyrIHLAH3FHuzPL4qWUd_6DArMlHlnYCQGfs9q33e4pw8BcNmTj61DUZIM2kSXHJdPSP5CETwbt_Gdfg_LXMoVhB_QJCP3oULqCZmK8g6yodrSDW6Za1FGYAyfaWso4"/>
</div>
<div>
<h2 class="font-headline font-bold text-on-surface tracking-tight">Post a Sprint</h2>
<p class="font-label text-xs text-on-surface-variant uppercase tracking-widest">Share your technical edge</p>
</div>
</div>
<!-- Input Area -->
<div class="flex-1">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-3xl md:text-4xl font-headline font-light placeholder:text-surface-container-highest resize-none text-on-surface" placeholder="How was your session?" rows="4"></textarea>
</div>
<!-- Contextual Toggles (Asymmetric Bento Style) -->
<div class="grid grid-cols-12 gap-4 mt-8">
<!-- Mood Selector -->
<div class="col-span-12 md:col-span-7 bg-surface-container-low rounded-xl p-5 border-l-4 border-primary">
<label class="block font-label text-[10px] text-on-surface-variant uppercase tracking-[0.15em] mb-4">Post-Session Intensity</label>
<div class="flex gap-2">
<button class="flex-1 flex flex-col items-center gap-2 p-3 rounded-lg bg-surface-container hover:bg-surface-container-high transition-all group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors" data-icon="energy_savings_leaf">energy_savings_leaf</span>
<span class="font-label text-[11px] text-on-surface-variant">Recovery</span>
</button>
<button class="flex-1 flex flex-col items-center gap-2 p-3 rounded-lg bg-primary-container/10 border border-primary/20 transition-all group">
<span class="material-symbols-outlined text-primary" data-icon="bolt" data-weight="fill">bolt</span>
<span class="font-label text-[11px] text-primary font-semibold">Strong</span>
</button>
<button class="flex-1 flex flex-col items-center gap-2 p-3 rounded-lg bg-surface-container hover:bg-surface-container-high transition-all group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-error transition-colors" data-icon="battery_low">battery_low</span>
<span class="font-label text-[11px] text-on-surface-variant">Fatigue</span>
</button>
</div>
</div>
<!-- Attachment Card -->
<div class="col-span-12 md:col-span-5 bg-surface-container-low rounded-xl p-5 relative overflow-hidden group cursor-pointer">
<div class="absolute inset-0 opacity-10">
<img class="w-full h-full object-cover" data-alt="Abstract visualization of fitness data metrics with neon light lines and dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2_-0ABpE_P8Xp-nHJW2FgXMwNlWZxlhHTZ5A7d-fXcK-u7VAsgF-3Gc31ai3AYMEq7-VZ-DVkrPSi4E9AmEXqWr6hd6IzqhHoKGJ_xhGqcJet6EC2E-MvBYSLxjWZcaF9BEroAmSgfi3K5u3qx7qOg6MvfT4poExxMHLYM6Z7Zq-6D3ZxcDYdPbApifA5hTn7GWmL6tKhrGKDbclhsoZPKAG6sHjivykNkK_j-n2ikz-IUxZLbL5S1QMhn46Vek9C5A5HlOJ8Dec"/>
</div>
<div class="relative z-10 h-full flex flex-col justify-between">
<label class="block font-label text-[10px] text-on-surface-variant uppercase tracking-[0.15em]">Last Activity</label>
<div>
<p class="font-headline font-bold text-on-surface">5.2km Tempo</p>
<p class="font-label text-[11px] text-primary">Attach Summary</p>
</div>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-slate-950/60 backdrop-blur-xl h-20 flex items-center px-8 border-t border-outline-variant/10">
<div class="max-w-3xl mx-auto w-full flex items-center justify-between">
<div class="flex gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="image">image</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="location_on">location_on</span>
</button>
</div>
<button class="liquid-metal px-10 py-3 rounded-lg shadow-[0_8px_24px_rgba(70,244,203,0.2)] active:scale-95 transition-transform">
<span class="font-headline font-bold text-on-primary tracking-tight">Post Sprint</span>
</button>
</div>
</footer>
<!-- Responsive Navigation (Based on JSON, Hidden on focused task screen but kept for structural consistency as per instructions if needed, though 'Sprint Note' is task-focused) -->
<!-- BottomNavBar Suppressed for Focus as per Shell Visibility Rule: "Any sub-page featuring a Close or Back action implies a temporary departure" -->
</body></html>
