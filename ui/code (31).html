<style>
        body {
            background-color: #121316;
            color: #e3e2e6;

<body class="min-h-screen selection:bg-primary-container selection:text-on-primary-container">

</div>
<div class="text-2xl font-[800] tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-[#4A8DFF] to-[#00D7B0]">ZVELT</div>
<div class="flex items-center gap-2 active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined text-slate-500 hover:opacity-80 transition-opacity">settings</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto">

<div class="mb-8">
<h1 class="font-headline font-extrabold text-[38px] leading-tight tracking-tight mb-2">

<p class="font-['Space_Mono'] text-primary-container/60 text-xs tracking-widest">

</div>
<!-- 2x3 Grid of Sport Cards -->

<div class="absolute top-4 right-4 text-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="text-5xl mb-4 grayscale-0 group-hover:scale-110 transition-transform">🚴</div>
<span class="font-headline font-bold text-lg text-on-surface">Cycling</span>
</div>
<!-- Selected Card: Gym -->
<div class="relative group cursor-pointer aspect-square rounded-xl bg-primary-container/5 border border-primary-container shadow-[0_0_30px_rgba(0,215,176,0.1)] transition-all p-6 flex flex-col items-center justify-center text-center">
<div class="absolute top-4 right-4 text-primary-container">

<div class="absolute top-4 right-4 text-primary-container">

</div>

<span class="font-headline font-bold text-lg text-slate-500 group-hover:text-on-surface transition-colors">Swimming</span>

</div>

<div class="group cursor-pointer aspect-square rounded-xl bg-white/5 border border-white/10 hover:border-white/20 transition-all p-6 flex flex-col items-center justify-center text-center">
