<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary overflow-x-hidden">
<div class="fixed inset-0 grain-overlay z-0"></div>
<div class="fixed inset-0 blue-glow-radial z-0"></div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#121316]/80 backdrop-blur-lg border-b border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.1)]">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform hover:opacity-80">
<span class="material-symbols-outlined text-[#00D7B0]">arrow_back</span>
</button>
<span class="text-2xl font-[800] tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-[#4A8DFF] to-[#00D7B0]">ZVELT</span>
</div>
<button class="active:scale-95 transition-transform hover:opacity-80">
<span class="material-symbols-outlined text-[#00D7B0]">settings</span>
</button>
</header>
<main class="relative z-10 pt-24 pb-32 px-6 max-w-lg mx-auto">
<!-- Feature Tag -->
<div class="mb-4 inline-flex items-center gap-2 px-3 py-1 bg-surface-container-highest rounded-full">
<span class="material-symbols-outlined text-[14px] text-tertiary" style="font-variation-settings: 'FILL' 1;">nightlight_round</span>
<span class="font-label text-[10px] font-bold text-on-surface-variant tracking-widest">MODULE 04</span>
</div>
<!-- Heading -->
<h1 class="font-headline font-extrabold text-[40px] leading-tight tracking-tight mb-8">Sleep</h1>
<!-- Top Grid -->
<div class="grid grid-cols-2 gap-4 mb-6">
<!-- Sleep Needed Card -->
<div class="bg-white/[0.04] backdrop-blur-xl border border-white/[0.08] p-6 rounded-xl relative overflow-hidden group">
<div class="absolute top-0 right-0 p-4 opacity-20">
<span class="material-symbols-outlined text-4xl">bedtime</span>
</div>
<p class="font-label text-[10px] text-on-surface-variant uppercase tracking-widest mb-2">Sleep Needed</p>
<div class="flex items-baseline gap-1">
<span class="font-headline font-extrabold text-3xl">8</span>
<span class="font-label text-sm text-tertiary">h</span>
<span class="font-headline font-extrabold text-3xl ml-1">12</span>
<span class="font-label text-sm text-tertiary">m</span>
</div>
<div class="mt-4 h-1 w-full bg-surface-container-low rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-[#4A8DFF] to-[#00D7B0] w-[85%]"></div>
</div>
</div>
<!-- Deep Sleep Card -->
<div class="bg-[#0264d4]/10 backdrop-blur-xl border border-[#0264d4]/30 p-6 rounded-xl relative overflow-hidden">
<div class="absolute -bottom-4 -right-4 w-24 h-24 bg-[#0264d4]/20 rounded-full blur-2xl"></div>
<p class="font-label text-[10px] text-secondary tracking-widest uppercase mb-2">Deep Sleep</p>
<div class="flex items-baseline gap-1">
<span class="font-headline font-extrabold text-3xl text-secondary">1</span>
<span class="font-label text-sm text-secondary-fixed-dim">h</span>
<span class="font-headline font-extrabold text-3xl ml-1 text-secondary">21</span>
<span class="font-label text-sm text-secondary-fixed-dim">m</span>
</div>
<div class="mt-4 flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">trending_up</span>
<span class="font-label text-[10px] text-secondary">+12% vs avg</span>
</div>
</div>
</div>
<!-- Sleep Report Card -->
<section class="bg-white/[0.04] backdrop-blur-xl border border-white/[0.08] rounded-xl p-6 mb-8">
<div class="flex justify-between items-center mb-8">
<h3 class="font-headline font-extrabold text-lg">Sleep Report</h3>
<span class="font-label text-[10px] text-on-surface-variant">LAST 24H</span>
</div>
<div class="space-y-8">
<!-- Efficiency Row -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<span class="font-label text-xs font-bold text-on-surface uppercase tracking-wider">Efficiency</span>
<div class="flex items-baseline gap-1">
<span class="font-headline font-extrabold text-xl">94</span>
<span class="font-label text-[10px] text-tertiary-fixed-dim">%</span>
</div>
</div>
<div class="h-2 w-full bg-surface-container-low rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-[#4A8DFF] to-[#00D7B0] w-[94%]"></div>
</div>
</div>
<!-- HR Dip Row -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<span class="font-label text-xs font-bold text-on-surface uppercase tracking-wider">HR Dip</span>
<div class="flex items-baseline gap-1">
<span class="font-headline font-extrabold text-xl">12.4</span>
<span class="font-label text-[10px] text-tertiary-fixed-dim">%</span>
</div>
</div>
<div class="h-2 w-full bg-surface-container-low rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-[#4A8DFF] to-[#00D7B0] w-[65%]"></div>
</div>
</div>
<!-- Time Asleep Row -->
<div class="space-y-3">
<div class="flex justify-between items-end">
<span class="font-label text-xs font-bold text-on-surface uppercase tracking-wider">Time Asleep</span>
<div class="flex items-baseline gap-1">
<span class="font-headline font-extrabold text-xl">7.2</span>
<span class="font-label text-[10px] text-tertiary-fixed-dim">HRS</span>
</div>
</div>
<div class="h-2 w-full bg-surface-container-low rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-[#4A8DFF] to-[#00D7B0] w-[78%]"></div>
</div>
</div>
</div>
</section>
<!-- CTA Section -->
<div class="flex flex-col gap-6">
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-lg border-l-2 border-primary">
<div class="flex flex-col">
<span class="font-label text-[10px] text-on-surface-variant uppercase">Recovery Prediction</span>
<span class="font-body font-semibold text-sm">Optimal window at 07:45 AM</span>
</div>
<span class="material-symbols-outlined text-primary">bolt</span>
</div>
<button class="w-full py-5 rounded-full bg-gradient-to-r from-[#4A8DFF] to-[#00D7B0] font-headline font-bold text-on-primary tracking-wide active:scale-95 transition-all shadow-[0_8px_32px_rgba(0,215,176,0.3)]">
                Continue
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 bg-[#121316]/90 backdrop-blur-xl border-t border-white/5 pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<a class="flex flex-col items-center justify-center text-slate-600 p-3 hover:text-[#4A8DFF] transition-colors active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined">bolt</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-600 p-3 hover:text-[#4A8DFF] transition-colors active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined">query_stats</span>
</a>
<a class="flex flex-col items-center justify-center text-[#00D7B0] bg-gradient-to-b from-[#00D7B0]/10 to-transparent p-3 relative after:content-[''] after:absolute after:top-0 after:w-1/2 after:h-[2px] after:bg-[#00D7B0] active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-600 p-3 hover:text-[#4A8DFF] transition-colors active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</nav>
