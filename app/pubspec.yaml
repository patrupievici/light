name: zvelt_app
description: Zvelt — fitness app (training, nutrition, social)
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # i18n scaffold (gen-l10n). flutter_localizations ships the Material/Cupertino/
  # Widgets localization delegates; intl backs the generated AppLocalizations
  # (ICU plurals/selects). See l10n.yaml + lib/l10n/app_*.arb. Pilot screen:
  # screens/settings/language_screen.dart. Full migration is incremental.
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.2
  # Wave 14 — auth tokens move from SharedPreferences (world-readable on
  # rooted/jailbroken devices) to Keychain (iOS) / EncryptedSharedPreferences
  # (Android). Min Android API 23; we ship minSdk=28, so this is safe.
  flutter_secure_storage: ^9.2.4
  google_sign_in: ^6.2.2
  flutter_svg: ^2.0.10+1
  image_picker: ^1.0.7
  # Calendar UI — Apache-2.0, https://github.com/aleksanderwozniak/table_calendar
  table_calendar: ^3.1.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  sqflite: ^2.3.3
  # Wave 15 — encrypt all local SQLite DBs (health, journal, photo paths,
  # workouts, rest intervals, GPS tracks). API-compatible drop-in: same
  # `openDatabase()` surface but ships SQLCipher native binaries and accepts
  # a `password:` parameter. Verified ^3.4.0 against sqflite_common ^2.x.
  sqflite_sqlcipher: ^3.4.0
  path: ^1.9.0
  screenshot: ^2.3.0
  share_plus: any
  path_provider: ^2.1.2
  wakelock_plus: ^1.5.1
  fl_chart: ^1.2.0
  chat_bubbles: ^1.9.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  # P0.6 — production crash reporting. Required to measure crash-free
  # sessions SLO (>=99.5%). Compatible with firebase_core ^4.x and BoM 34.x.
  firebase_crashlytics: ^5.0.0
  # RevenueCat wraps StoreKit 2 / Play Billing. Public SDK keys are injected
  # with --dart-define; the service remains disabled when a key is absent.
  purchases_flutter: ^10.4.1
  url_launcher: ^6.3.0
  mobile_scanner: ^7.2.0
  flutter_dotenv: ^5.2.1
  home_widget: ^0.9.1
  connectivity_plus: ^6.0.5
  uuid: ^4.5.1
  intl: any
  package_info_plus: ^9.0.1
  # Wave 19b — disk-backed image cache. Flutter's default ImageCache is in-memory
  # only (100MB, evicted on pressure), so every screen revisit re-downloads from
  # network. Killer for retention on cellular. cached_network_image stores
  # decoded bytes on disk keyed by URL hash; survives app restarts.
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  # Flaticon UIcons (bold rounded) — app-wide icon system. Bundles the fonts;
  # icons remain under Flaticon's license (attribution shown in Settings).
  uicons: ^1.0.1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  # i18n scaffold — enables Flutter's gen-l10n codegen. Reads l10n.yaml +
  # lib/l10n/app_*.arb and generates AppLocalizations at build/run time.
  generate: true
  assets:
    - assets/dotenv
    - assets/foods.db
    - assets/images/zvelt_logo.png
    - assets/images/zvelt_splash.png
    # ZVELT coach mascot (3D rabbit) — periwinkle "De ce ai nevoie?" design.
    - assets/mascot/
  fonts:
    # Manrope — Claude Design handoff typeface (variable font; Flutter maps
    # fontWeight to the wght axis 400..800). Bundled for offline first-paint
    # and deterministic tests (avoids google_fonts' runtime network fetch).
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-var.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
          weight: 400
    # IBM Plex Mono — V2 token system (metrics, eyebrows, technical labels).
    # See zvelt_tokens.dart for the .zNum / .zEyebrow utility styles.
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
    # ZVELT Premium typography (Claude Design handoff): Barlow Condensed =
    # display headings + big metrics (body stays Inter to avoid overflow).
    - family: BarlowCondensed
      fonts:
        - asset: assets/fonts/BarlowCondensed-Regular.ttf
          weight: 400
        - asset: assets/fonts/BarlowCondensed-Medium.ttf
          weight: 500
        - asset: assets/fonts/BarlowCondensed-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BarlowCondensed-Bold.ttf
          weight: 700
        - asset: assets/fonts/BarlowCondensed-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/BarlowCondensed-Black.ttf
          weight: 900

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: assets/images/app_icon_fg.png
